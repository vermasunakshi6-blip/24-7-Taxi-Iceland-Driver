name: taxi_driver_24_7
description: 24-7 Taxi Driver - accept rides and earn. Standalone app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  country_code_picker: ^3.0.0
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.9
  otp_text_field: ^1.1.2
  interactive_bottom_sheet: ^1.0.0
  flutter_rating_bar: ^4.0.1
  toggle_switch: ^2.1.0
  image_picker: ^1.0.7
  google_sign_in: ^7.2.0
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.1.0
  build_runner: ^2.4.8
  json_annotation: ^4.8.1
  aescryptojs: ^1.0.0
  crypto: ^3.0.3
  firebase_messaging: ^16.1.1
  google_places_flutter: ^2.0.8
  google_maps_flutter: ^2.6.0
  location: ^8.0.1
  geocoding: ^4.0.0
  connectivity_plus: ^6.1.5
  flutter_polyline_points: ^3.1.0
  socket_io_client: ^3.1.4
  web_socket_channel: ^3.0.3
  intl: ^0.20.2
  flutter_cache_manager: ^3.3.1
  fl_chart: ^1.1.1
  flutter_local_notifications: ^20.1.0
  app_settings: ^7.0.0
  permission_handler: ^12.0.1
  flutter_contacts: ^1.1.7
  country_data: ^0.0.2
  internet_connection_checker: ^3.0.1
  flutter_html: ^3.0.0-beta.2
  video_player: ^2.10.1
  path_provider: ^2.1.4
  table_calendar: ^3.0.9
  dotted_border: ^3.1.0
  url_launcher: ^6.3.1
  app_links: ^6.4.0
  share_plus: ^12.0.1
  geekyants_flutter_gauges: ^1.0.4
  dotted_line: ^3.2.3
  qr_flutter: ^4.0.0
  smooth_page_indicator: ^2.0.1
  material_charts: ^0.0.25
  omni_datetime_picker: ^2.0.4
  lottie: ^3.2.0
  infinite_scroll_pagination: ^5.1.1
  shimmer: ^3.0.0
  change_app_package_name: ^1.5.0
  pin_code_fields: ^8.0.1
  csc_picker: ^0.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.9
  json_serializable: ^6.7.0
  flutter_launcher_icons: ^0.14.3
  image: ^4.8.0

dependency_overrides:
  csc_picker:
    git:
      url: https://github.com/Ostrich-Cyber-Risk/csc_picker.git
      ref: master

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/json/
  fonts:
    - family: CustomFont
      fonts:
        - asset: assets/font/proxima_nova_bold.ttf

flutter_launcher_icons:
  android: true
  ios: true
  # Pre-zoomed asset (see tool/zoom_launcher_icon.dart); regenerate after logo changes.
  image_path: "assets/images/logo_white_bg_launcher.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo_white_bg_launcher.png"
  # Default is 16; lower inset = larger foreground inside the adaptive icon mask.
  adaptive_icon_foreground_inset: 12
